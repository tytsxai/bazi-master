# Docker's default json-file log driver has no size cap, so every service below pins one.
# Without it the host disk fills up over weeks and postgres is the first thing to break.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '20m'
    max-file: '5'

services:
  postgres:
    image: postgres:16
    container_name: bazi_postgres
    restart: always
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # No default on purpose: a missing password must fail the deploy, not silently
      # start postgres with a well-known weak credential.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-bazi_master}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bazi_master}']
      interval: 5s
      timeout: 3s
      retries: 10
    stop_grace_period: 30s

  redis:
    image: redis:7
    container_name: bazi_redis
    restart: always
    logging: *default-logging
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    stop_grace_period: 15s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bazi_backend
    restart: always
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bazi_master}?schema=public
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: ${FRONTEND_URL}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL}
      ALLOW_LOCALHOST_PROD: ${ALLOW_LOCALHOST_PROD:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      TRUST_PROXY: ${TRUST_PROXY:-}
      SESSION_IDLE_MS: ${SESSION_IDLE_MS:-}
      SESSION_TOKEN_SECRET: ${SESSION_TOKEN_SECRET}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-}
      AI_TIMEOUT_MS: ${AI_TIMEOUT_MS:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET:-}
      WECHAT_SCOPE: ${WECHAT_SCOPE:-}
      WECHAT_FRONTEND_URL: ${WECHAT_FRONTEND_URL:-}
      WECHAT_REDIRECT_URI: ${WECHAT_REDIRECT_URI:-}
      RESET_TOKEN_TTL_MS: ${RESET_TOKEN_TTL_MS:-}
      RESET_REQUEST_MIN_DURATION_MS: ${RESET_REQUEST_MIN_DURATION_MS:-}
      PASSWORD_RESET_ENABLED: ${PASSWORD_RESET_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_REPLY_TO: ${SMTP_REPLY_TO:-}
      SMTP_TIMEOUT_MS: ${SMTP_TIMEOUT_MS:-}
      PASSWORD_RESET_SUBJECT: ${PASSWORD_RESET_SUBJECT:-}
      IMPORT_BATCH_SIZE: ${IMPORT_BATCH_SIZE:-}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-}
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: ${GRACEFUL_SHUTDOWN_TIMEOUT_MS:-}
      SERVER_KEEP_ALIVE_TIMEOUT_MS: ${SERVER_KEEP_ALIVE_TIMEOUT_MS:-}
      SERVER_HEADERS_TIMEOUT_MS: ${SERVER_HEADERS_TIMEOUT_MS:-}
      SERVER_REQUEST_TIMEOUT_MS: ${SERVER_REQUEST_TIMEOUT_MS:-}
      RUN_MIGRATIONS_ON_START: ${RUN_MIGRATIONS_ON_START:-}
      SESSION_COOKIE_SAMESITE: ${SESSION_COOKIE_SAMESITE:-}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      DOCS_USER: ${DOCS_USER:-}
      DOCS_PASSWORD: ${DOCS_PASSWORD:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      ALLOW_DEV_OAUTH: ${ALLOW_DEV_OAUTH:-false}
      SEED_DEFAULT_USER: ${SEED_DEFAULT_USER:-false}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-}
      SEED_USER_NAME: ${SEED_USER_NAME:-}
      ALLOW_RUNTIME_SCHEMA_SYNC: ${ALLOW_RUNTIME_SCHEMA_SYNC:-}
      LOG_LEVEL: ${LOG_LEVEL:-}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-}
      MAX_URL_LENGTH: ${MAX_URL_LENGTH:-}
      MAX_INPUT_ARRAY_LENGTH: ${MAX_INPUT_ARRAY_LENGTH:-}
      MAX_INPUT_DEPTH: ${MAX_INPUT_DEPTH:-}
      MAX_INPUT_KEYS: ${MAX_INPUT_KEYS:-}
      MAX_INPUT_STRING_LENGTH: ${MAX_INPUT_STRING_LENGTH:-}
      BAZI_CACHE_TTL_MS: ${BAZI_CACHE_TTL_MS:-}
      BAZI_CACHE_MAX_ENTRIES: ${BAZI_CACHE_MAX_ENTRIES:-}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-}
      # Make sure to set these in .env or CI secrets
      ADMIN_EMAILS: ${ADMIN_EMAILS}
    ports:
      # Loopback by default: TLS termination and the public edge belong to nginx.
      # Publishing to 0.0.0.0 writes iptables rules that bypass ufw/firewalld.
      - '${BACKEND_BIND_ADDR:-127.0.0.1}:4000:4000'
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEMORY_LIMIT:-1g}
    stop_grace_period: 30s
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:4000/api/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_CDN_URL: ${VITE_CDN_URL:-/}
    container_name: bazi_frontend
    restart: always
    logging: *default-logging
    depends_on:
      - backend
    ports:
      - '${FRONTEND_BIND_ADDR:-127.0.0.1}:3000:80'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 15s

volumes:
  postgres_data:
  redis_data:
