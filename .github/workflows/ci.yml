name: CI

on:
  push:
    branches: ['master', 'main']
  pull_request:
    branches: ['master', 'main']

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bazi_master_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bazi_master_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    strategy:
      matrix:
        # The project requires Node 20+ (see README and docs); testing 18 verified a
        # version that is not supported.
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      # Backend Setup & Test
      - name: Install Backend Dependencies
        run: |
          cd backend
          npm ci

      - name: Prepare Backend Test Database
        run: |
          cd backend
          export DATABASE_URL='postgresql://postgres:postgres@127.0.0.1:5432/bazi_master_e2e?schema=public'
          # Use `migrate reset` so the prisma migration history table is set up.
          # `db push` writes the schema directly without history, which then
          # causes the test runner's subsequent `migrate deploy` to hit P3005
          # ("schema is not empty").
          node scripts/prisma.mjs migrate reset --force --skip-seed --schema=../prisma/schema.prisma

      # ESLint and Prettier are configured at the repository root, not in backend/.
      # This step used to run `npm run lint --if-present` inside backend/, where no
      # lint script exists, so it always passed without checking anything.
      - name: Lint & Format Check
        run: |
          npm ci
          npm run lint
          npm run format:check

      - name: Check env template covers every variable the code reads
        run: ./scripts/check-env-template.sh

      - name: Run Backend Tests
        run: |
          cd backend
          # Ensure we use a test env
          export NODE_ENV=test
          export DATABASE_URL='postgresql://postgres:postgres@127.0.0.1:5432/bazi_master_e2e?schema=public'
          npm test

      # Frontend Setup & Test
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      # Unit tests are fast and were never wired into CI, so a green pipeline said
      # nothing about them. Run them before the much slower Playwright suite.
      - name: Run Frontend Unit Tests
        run: |
          cd frontend
          npm run test:unit:run

      - name: Run Frontend E2E Tests
        run: |
          cd frontend
          npm test
        env:
          E2E_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bazi_master_e2e?schema=public
